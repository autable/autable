server:
  address: "127.0.0.1:8080"
  public_url: "https://autable.example.com"
data:
  path: "./data"
repository:
  # Set to false for local testing: metadata and scripts are still stored
  # under path, but no git repository, commits, or pushes are managed, and
  # remote_url/remote_branch are not required.
  enabled: false
  path: "./repository"
  remote_url: "https://YOUR_PAT@github.com/example/autable-repository.git"
  remote_branch: "main"
  sync:
    debounce: "2s"
    push_timeout: "30s"
    author_name: "autable"
    author_email: "autable@example.local"
s3:
  connection:
    endpoint: "https://s3.example.com"
    region: "us-east-1"
    bucket: "autable"
    access_key_id: "replace-me"
    secret_access_key: "replace-me"
    force_path_style: true
  directories:
    backup: "backup"
    files: "files"

backup:
  enabled: false
  interval: "24h"
  include_leveldb: false
  tmp_dir: "./data/backups-tmp"
auth:
  password:
    enabled: true
  oidc:
    enabled: false
    providers:
      - name: "example"
        issuer_url: "https://accounts.example.com"
        client_id: "autable"
        client_secret: "replace-me"
        scopes: ["openid", "email", "profile"]
debug:
  pprof_address: ""
