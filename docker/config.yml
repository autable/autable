server:
  address: "0.0.0.0:8080"
data:
  path: "/data"
repository:
  path: "/repository"
  remote_url: "https://YOUR_PAT@github.com/example/autable-repository.git"
  remote_branch: "main"
  sync:
    debounce: "2s"
    push_timeout: "30s"
    author_name: "autable"
    author_email: "autable@example.local"
backup:
  enabled: false
  interval: "24h"
  include_leveldb: false
  tmp_dir: "/tmp/autable-backups"
  s3:
    endpoint: "https://s3.example.com"
    region: "us-east-1"
    bucket: "autable-backups"
    prefix: "autable"
    access_key_id: "replace-me"
    secret_access_key: "replace-me"
    force_path_style: true
auth:
  password:
    enabled: true
  oidc:
    enabled: false
    providers: []
ai:
  enabled: false
  worker_url: ""
debug:
  pprof_address: ""
