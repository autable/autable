name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: 24
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.version.outputs.commit }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Compute release version
        id: version
        shell: bash
        run: |
          bump="${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}"
          latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest" ]; then
            current="$(node -p "require('./web/package.json').version")"
          else
            current="${latest#v}"
          fi
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unsupported current version: $current" >&2
            exit 1
          fi
          IFS=. read -r major minor patch <<< "$current"
          case "$bump" in
            major)
              major=$((major + 1)); minor=0; patch=0
              ;;
            minor)
              minor=$((minor + 1)); patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "unsupported bump: $bump" >&2
              exit 1
              ;;
          esac
          next="${major}.${minor}.${patch}"
          tag="v${next}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "release tag already exists: $tag" >&2
            exit 1
          fi
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            binary: autable
            goos: linux
            goarch: amd64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            binary: autable
            goos: linux
            goarch: arm64
          - target: windows-amd64
            runner: windows-latest
            binary: autable.exe
            goos: windows
            goarch: amd64
          - target: darwin-arm64
            runner: macos-15
            binary: autable
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend for embedding
        shell: bash
        run: |
          npm ci --prefix web
          npm --prefix web test -- --run
          ./scripts/embed-web.sh
      - name: Test Go
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./...
      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          commit="$(git rev-parse --short HEAD)"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p release
          go build \
            -ldflags "-s -w -X autable/internal/version.Version=${version} -X autable/internal/version.Commit=${commit} -X autable/internal/version.BuiltAt=${built_at}" \
            -o "release/${{ matrix.binary }}" \
            ./cmd/autable
      - name: Package Unix artifact
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          tar -czf "autable-${version}-${{ matrix.target }}.tar.gz" -C release "${{ matrix.binary }}"
      - name: Package Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          Compress-Archive -Path "release/${{ matrix.binary }}" -DestinationPath "autable-$version-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: autable-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: autable-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
      - docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.commit }}
          name: autable ${{ needs.prepare.outputs.tag }}
          body: Automated release for autable ${{ needs.prepare.outputs.tag }}.
          files: artifacts/*
          fail_on_unmatched_files: true

  docker:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - name: Compute image build metadata
        id: image
        shell: bash
        run: |
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "commit_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ steps.image.outputs.commit_short }}
            BUILT_AT=${{ steps.image.outputs.built_at }}
