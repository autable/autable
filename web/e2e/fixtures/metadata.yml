databases:
  - name: workspace
    sqlite_path: ./web/e2e/.runtime/data/workspace.sqlite
    tables:
      - name: contacts
        display_name: Contacts
        fields:
          - name: name
            type: string
            deleted: false
          - name: email
            type: string
            deleted: false
          - name: status
            type: string
            deleted: false
        views:
          - name: active
            display_name: Active
            filters:
              - field: status
                op: eq
                value: Active
            sorts:
              - field: name
                direction: asc
          - name: active-email
            display_name: Active with email
            base_view: active
            filters:
              - field: email
                op: not_empty
                value: null
            sorts:
              - field: record_id
                direction: desc
