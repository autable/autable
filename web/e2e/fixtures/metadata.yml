databases:
  - name: workspace
    tables:
      - name: contacts
        display_name: Contacts
        fields:
          - name: name
            type: string
            deleted: false
          - name: email
            type: string
            deleted: false
          - name: status
            type: string
            deleted: false
        views:
          - name: active
            display_name: Active
            query:
              combinator: and
              rules:
                - field: status
                  operator: "="
                  value: Active
            sorts:
              - field: name
                direction: asc
          - name: active-email
            display_name: Active with email
            base_view: active
            query:
              combinator: and
              rules:
                - field: email
                  operator: notNull
            sorts:
              - field: ct_record_id
                direction: desc
